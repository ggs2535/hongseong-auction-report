name: Update auction report

on:
  schedule:
    - cron: "37 9 * * *"
  workflow_dispatch:
  issues:
    types:
      - opened

concurrency:
  group: >-
    ${{
      (
        github.event_name != 'issues' ||
        (
          github.repository == 'ggs2535/hongseong-auction-report' &&
          github.actor == 'ggs2535' &&
          github.triggering_actor == 'ggs2535' &&
          github.event.issue.user.login == 'ggs2535' &&
          github.event.issue.author_association == 'OWNER' &&
          github.event.issue.title == '[즉시조회]'
        )
      )
      && 'hongseong-auction-report-update'
      || format('ignored-issue-{0}', github.run_id)
    }}
  cancel-in-progress: false

permissions: {}

jobs:
  gate:
    name: Authorize and protect query
    if: >-
      ${{
        github.event_name != 'issues' ||
        (
          github.repository == 'ggs2535/hongseong-auction-report' &&
          github.actor == 'ggs2535' &&
          github.triggering_actor == 'ggs2535' &&
          github.event.issue.user.login == 'ggs2535' &&
          github.event.issue.author_association == 'OWNER' &&
          github.event.issue.title == '[즉시조회]'
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.policy.outputs.allowed }}
      immediate: ${{ steps.policy.outputs.immediate }}
      reason: ${{ steps.policy.outputs.reason }}
      wait_seconds: ${{ steps.policy.outputs.wait_seconds }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Apply immediate-query safety policy
        id: policy
        run: node src/instant-query-policy.js

  update:
    name: Test, collect, and build report
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    outputs:
      report_complete: ${{ steps.instant_outcome.outputs.complete }}
      report_blocked: ${{ steps.instant_outcome.outputs.blocked }}
      report_error_code: ${{ steps.instant_outcome.outputs.error_code }}
      report_error_status: ${{ steps.instant_outcome.outputs.error_status }}
      report_result: ${{ steps.instant_outcome.outputs.result }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: node node_modules/playwright/cli.js install --with-deps chromium

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Reserve query safety window
        id: reserve
        shell: bash
        run: |
          node src/instant-query-state.js reserve
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/instant-query-state.json
          git commit -m "chore(state): reserve auction query"
          git push

      - name: Update live report
        id: update
        env:
          AUCTION_MODE: live
        shell: bash
        run: |
          set -o pipefail
          npm run update 2>&1 | tee update.log

      - name: Write structured job summary
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          UPDATE_OUTCOME: ${{ steps.update.outcome }}
        run: node src/actions-summary.js

      - name: Record immediate-query outcome
        id: instant_outcome
        if: >-
          ${{
            always() &&
            steps.reserve.outcome == 'success'
          }}
        env:
          UPDATE_OUTCOME: ${{ steps.update.outcome }}
        run: node src/instant-query-state.js finalize

      - name: Persist immediate-query outcome
        if: >-
          ${{
            always() &&
            steps.instant_outcome.outcome == 'success'
          }}
        shell: bash
        run: |
          git add -- data/instant-query-state.json
          if git diff --cached --quiet; then
            echo "No immediate-query state change to commit."
          else
            git commit -m "chore(state): record auction query outcome"
            git push
          fi

      - name: Commit generated report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data public
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore(data): update auction report"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy GitHub Pages
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5

  finish_instant_query:
    name: Report instant-query result
    needs:
      - gate
      - update
      - deploy
    if: >-
      ${{
        always() &&
        github.event_name == 'issues' &&
        github.repository == 'ggs2535/hongseong-auction-report' &&
        github.actor == 'ggs2535' &&
        github.triggering_actor == 'ggs2535' &&
        github.event.issue.user.login == 'ggs2535' &&
        github.event.issue.author_association == 'OWNER' &&
        github.event.issue.title == '[즉시조회]'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Comment with result and close request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          POLICY_ALLOWED: ${{ needs.gate.outputs.allowed }}
          POLICY_REASON: ${{ needs.gate.outputs.reason }}
          WAIT_SECONDS: ${{ needs.gate.outputs.wait_seconds }}
          UPDATE_RESULT: ${{ needs.update.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPORT_COMPLETE: ${{ needs.update.outputs.report_complete }}
          REPORT_BLOCKED: ${{ needs.update.outputs.report_blocked }}
          REPORT_ERROR_CODE: ${{ needs.update.outputs.report_error_code }}
          REPORT_ERROR_STATUS: ${{ needs.update.outputs.report_error_status }}
          REPORT_RESULT: ${{ needs.update.outputs.report_result }}
        run: |
          run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          report_url="https://ggs2535.github.io/hongseong-auction-report/"
          error_label="${REPORT_ERROR_CODE}"
          if [[ -n "${REPORT_ERROR_STATUS}" ]]; then
            error_label="${error_label} (HTTP ${REPORT_ERROR_STATUS})"
          fi

          if [[ "${POLICY_ALLOWED}" != "true" ]]; then
            if [[ "${POLICY_REASON}" == "blocked_today" ]]; then
              body="오늘 법원 사이트의 차단 응답이 기록되어 같은 날 즉시 조회를 다시 실행하지 않았습니다. 다음 정기 실행을 기다려 주세요."
            elif [[ "${POLICY_REASON}" == "uncertain_today" ]]; then
              body="법원 요청을 시작한 이전 실행이 비정상 종료되어 안전을 위해 오늘 즉시 재조회를 실행하지 않았습니다. 다음 정기 실행을 기다려 주세요."
            elif [[ "${POLICY_REASON}" == "cooldown" ]]; then
              wait_minutes=$(( (WAIT_SECONDS + 59) / 60 ))
              body="법원 사이트 과부하 방지를 위해 최근 실행 후 10분 동안은 다시 조회하지 않습니다. 약 ${wait_minutes}분 뒤 다시 요청해 주세요."
            elif [[ "${POLICY_REASON}" == "state_unavailable" ]]; then
              body="안전 상태 파일을 확인할 수 없어 즉시 조회를 실행하지 않았습니다. 실행 기록을 확인해 주세요. 실행 기록: ${run_url}"
            else
              body="안전 정책에 따라 이번 즉시 조회 요청을 실행하지 않았습니다."
            fi
          elif [[ "${REPORT_BLOCKED}" == "true" ]]; then
            body="법원 사이트 차단이 감지되어 전체조회는 완료되지 않았습니다. 배포 상태와 관계없이 오늘은 다시 요청하지 마세요. 오류: ${error_label} 보고서: ${report_url} 실행 기록: ${run_url}"
          elif [[ "${UPDATE_RESULT}" == "success" && "${DEPLOY_RESULT}" == "success" && "${REPORT_COMPLETE}" == "true" ]]; then
            body="즉시 전체조회와 보고서 배포가 완료되었습니다. 보고서: ${report_url} 실행 기록: ${run_url}"
          elif [[ "${UPDATE_RESULT}" == "success" && "${DEPLOY_RESULT}" == "success" ]]; then
            body="보고서는 배포했지만 법원 원본 전체조회는 완료되지 않았습니다. 오류: ${error_label} 상태: ${REPORT_RESULT} 보고서: ${report_url} 실행 기록: ${run_url}"
          else
            body="즉시 조회 자동화가 완료되지 않았습니다. 실행 기록에서 실패 단계를 확인해 주세요. 실행 기록: ${run_url}"
          fi

          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments" \
            -f body="${body}"
          gh api --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" \
            -f state=closed \
            -f state_reason=completed
