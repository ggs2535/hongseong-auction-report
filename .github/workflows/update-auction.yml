name: Update auction report

on:
  schedule:
    - cron: "37 9 * * *"
  workflow_dispatch:

concurrency:
  group: hongseong-auction-report-update
  cancel-in-progress: false

permissions: {}

jobs:
  update:
    name: Test, collect, and build report
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: node node_modules/playwright/cli.js install --with-deps chromium

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Update live report
        id: update
        env:
          AUCTION_MODE: live
        shell: bash
        run: |
          set -o pipefail
          npm run update 2>&1 | tee update.log

      - name: Write structured job summary
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          UPDATE_OUTCOME: ${{ steps.update.outcome }}
        run: node src/actions-summary.js

      - name: Commit generated report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data public
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore(data): update auction report"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy GitHub Pages
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
