name: Update auction report

on:
  schedule:
    - cron: "37 9-18 * * *"
      timezone: "Asia/Seoul"

concurrency:
  group: hongseong-auction-report-update
  cancel-in-progress: false

permissions: {}

jobs:
  gate:
    name: Protect scheduled query
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.policy.outputs.allowed }}
      reason: ${{ steps.policy.outputs.reason }}
      wait_seconds: ${{ steps.policy.outputs.wait_seconds }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Apply scheduled-query safety policy
        id: policy
        run: node src/query-safety-policy.js

  update:
    name: Test, collect, and build report
    needs: gate
    if: needs.gate.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: node node_modules/playwright/cli.js install --with-deps chromium

      - name: Run tests
        id: tests
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      - name: Reserve query safety window
        id: reserve
        shell: bash
        run: |
          node src/query-safety-state.js reserve
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data/query-safety-state.json
          git commit -m "chore(state): reserve auction query"
          git push

      - name: Update live report
        id: update
        env:
          AUCTION_MODE: live
        shell: bash
        run: |
          set -o pipefail
          npm run update 2>&1 | tee update.log

      - name: Write structured job summary
        if: always()
        env:
          TEST_OUTCOME: ${{ steps.tests.outcome }}
          UPDATE_OUTCOME: ${{ steps.update.outcome }}
        run: node src/actions-summary.js

      - name: Record scheduled-query outcome
        id: query_outcome
        if: >-
          ${{
            always() &&
            steps.reserve.outcome == 'success'
          }}
        env:
          UPDATE_OUTCOME: ${{ steps.update.outcome }}
        run: node src/query-safety-state.js finalize

      - name: Persist scheduled-query outcome
        if: >-
          ${{
            always() &&
            steps.query_outcome.outcome == 'success'
          }}
        shell: bash
        run: |
          git add -- data/query-safety-state.json
          if git diff --cached --quiet; then
            echo "No query safety state change to commit."
          else
            git commit -m "chore(state): record auction query outcome"
            git push
          fi

      - name: Commit generated report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- data public
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "chore(data): update auction report"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy GitHub Pages
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
