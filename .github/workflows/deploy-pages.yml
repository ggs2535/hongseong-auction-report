name: Deploy report site

on:
  push:
    branches:
      - main
    paths:
      - "public/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: hongseong-auction-report-pages
  cancel-in-progress: false

permissions: {}

jobs:
  verify:
    name: Verify frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    name: Deploy GitHub Pages
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
